<!DOCTYPE html>
<html>
<head>
    <title>Cryptography - CyberNest</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
<style>
    body {
        background: linear-gradient(to right, #373b44, #4286f4);
        color: white;
    }
    .form-control, .form-select {
        background-color: #2c2f33;
        color: white;
        border: 1px solid #444;
    }
    .btn:hover {
        transform: scale(1.05);
        transition: 0.2s ease-in-out;
    }
</style>

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">CyberNest</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/ctf">CTF Helpers</a></li>
                <li class="nav-item"><a class="nav-link" href="/crypto">Cryptography</a></li>
                <li class="nav-item"><a class="nav-link" href="/forensics">Digital Forensics</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="text-center">AES Encryption / Decryption</h2>
    <form method="post" class="p-4 rounded bg-dark shadow-lg">
        <div class="mb-3">
            <label class="form-label">Message:</label>
            <input type="text" name="message" class="form-control" placeholder="Enter text..." required>
        </div>
        <div class="mb-3">
            <label class="form-label">Key:</label>
            <input type="text" name="key" class="form-control" placeholder="Enter secret key" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Mode:</label>
            <select name="mode" class="form-select">
                <option value="encrypt">Encrypt</option>
                <option value="decrypt">Decrypt</option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">Execute</button>
    </form>
    {% if result %}
    <div class="alert alert-info mt-4 shadow">
        <strong>Result:</strong> {{ result }}
    </div>
    {% endif %}
</div>
</body>
</html>
